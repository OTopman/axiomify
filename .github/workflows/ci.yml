name: Axiomify CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout Code
        # Pin to SHA instead of floating tag to prevent supply-chain attacks.
        # Equivalent to actions/checkout@v4 at time of writing — verify and
        # update this SHA when you intentionally upgrade the action.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        # `npm ci` is deterministic — it installs exactly what is in
        # package-lock.json and fails if the lock file is out of sync.
        # `npm install` silently updates the lock file and can introduce
        # different dependency versions across CI runs.
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Typecheck & Build
        run: npm run build

      - name: Run Tests & Coverage
        run: npm run coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          # Set to true so a broken Codecov token doesn't silently drop
          # coverage tracking without any signal in CI.
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
