name: Axiomify CI

on:
  pull_request:
    branches: [ main, feature/* ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build # Assuming your root package.json triggers tsc/tsup across workspaces

      # - name: Run Tests
      #   run: npm test